<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>成就徽章墙 · 38枚完整原型</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:#f5f0eb}

/* 稀有度 */
.t-copper.earned{border-color:#CD7F32;background:linear-gradient(135deg,#fef9f2,#fff);box-shadow:0 0 12px rgba(205,127,50,.15)}
.t-silver.earned{border-color:#A8A8A8;background:linear-gradient(135deg,#fafafa,#fff);box-shadow:0 0 14px rgba(168,168,168,.18)}
.t-gold.earned{border-color:#DAA520;background:linear-gradient(135deg,#fffef8,#fffef5);box-shadow:0 0 18px rgba(218,165,32,.22)}
.t-legend.earned{border-color:#B44CF0;background:linear-gradient(135deg,#fdf5ff,#faf5ff);box-shadow:0 0 24px rgba(180,76,240,.25);animation:legendPulse 3s ease-in-out infinite}

@keyframes legendPulse{
0%,100%{box-shadow:0 0 24px rgba(180,76,240,.25)}
50%{box-shadow:0 0 36px rgba(180,76,240,.4),0 0 8px rgba(124,77,255,.25)}
}

/* icon */
.i-copper{background:linear-gradient(135deg,#CD7F32,#B87333)}
.i-silver{background:linear-gradient(135deg,#C0C0C0,#909090)}
.i-gold{background:linear-gradient(135deg,#FFD700,#F5A623)}
.i-legend{background:linear-gradient(135deg,#E040FB,#7C4DFF)}

/* 分类边框 */
.cat-volume{border-left:3px solid #CD7F32}
.cat-quality{border-left:3px solid #3B82F6}
.cat-streak{border-left:3px solid #EF4444}
.cat-module{border-left:3px solid #10B981}
.cat-combo{border-left:3px solid #8B5CF6}

/* 进度环 */
.progress-ring{transform:rotate(-90deg)}

/* 弹窗 */
.modal-in{animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body class="min-h-screen">

<!-- ═══ 头部统计 ═══ -->
<div class="bg-gradient-to-r from-stone-800 via-stone-700 to-stone-800 text-white">
<div class="max-w-6xl mx-auto px-6 py-8">
<h1 class="text-2xl font-bold mb-6">🏆 成就徽章</h1>
<div class="grid grid-cols-3 gap-4">
<div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/8">
<p class="text-3xl font-extrabold text-amber-400">38</p>
<p class="text-xs text-white/50 mt-1">已获得</p></div>
<div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/8">
<p class="text-3xl font-extrabold text-white">38</p>
<p class="text-xs text-white/50 mt-1">总徽章</p></div>
<div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/8">
<p class="text-3xl font-extrabold text-green-300">✓</p>
<p class="text-xs text-white/50 mt-1">全部集齐</p></div>
</div></div></div>

<!-- ═══ 主体 ═══ -->
<div class="max-w-6xl mx-auto px-6 py-8 space-y-10" id="app"></div>

<!-- ═══ 弹窗 ═══ -->
<div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center px-4" onclick="if(event.target===this)closeModal()">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
<div class="relative bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full modal-in" id="modal-inner"></div>
</div>

<script>
// ═══ 完整 38 枚徽章数据（来自 BadgeRegistry） ═══
const dates=['6月08日','6月10日','6月12日','6月14日','6月15日','6月16日','6月17日','6月18日','6月19日','6月20日'];
function rd(){return dates[Math.floor(Math.random()*dates.length)]}

const B={
'背诵量':[
{k:'total_10',n:'初出茅庐',d:'累计背诵 10 题',t:'copper',e:true,ea:rd()},
{k:'total_50',n:'小有所成',d:'累计背诵 50 题',t:'copper',e:true,ea:rd()},
{k:'total_100',n:'百题斩',d:'累计背诵 100 题',t:'silver',e:true,ea:rd()},
{k:'total_300',n:'题海勇士',d:'累计背诵 300 题',t:'gold',e:true,ea:rd()},
{k:'total_500',n:'题库终结者',d:'累计背诵 500 题',t:'legend',e:true,ea:rd()},
],
'质量':[
{k:'avg_7',n:'稳定发挥',d:'历史平均分 ≥ 7',t:'silver',e:true,ea:rd()},
{k:'avg_8',n:'优秀学者',d:'历史平均分 ≥ 8',t:'silver',e:true,ea:rd()},
{k:'avg_9',n:'接近完美',d:'历史平均分 ≥ 9',t:'gold',e:true,ea:rd()},
{k:'perfect_1',n:'首战满分',d:'首次获得 10 分',t:'silver',e:true,ea:rd()},
{k:'perfect_10',n:'满分收割机',d:'累计 10 次 10 分',t:'legend',e:true,ea:rd()},
],
'坚持':[
{k:'streak_3',n:'三天打鱼',d:'连续 3 天背诵',t:'copper',e:true,ea:rd()},
{k:'streak_7',n:'周不懈怠',d:'连续 7 天背诵',t:'silver',e:true,ea:rd()},
{k:'streak_14',n:'半月坚持',d:'连续 14 天背诵',t:'gold',e:true,ea:rd()},
{k:'streak_30',n:'月度之星',d:'连续 30 天背诵',t:'gold',e:true,ea:rd()},
{k:'streak_60',n:'持之以恒',d:'连续 60 天背诵',t:'legend',e:true,ea:rd()},
],
'模块':[
{k:'java-basics',n:'Java 基础达人',d:'Java 基础模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'juc',n:'并发大神',d:'JUC 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'jvm',n:'JVM 专家',d:'JVM 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'java-collections',n:'集合大师',d:'Java 集合模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'spring',n:'Spring 高手',d:'Spring 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'mysql',n:'MySQL 达人',d:'MySQL 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'redis',n:'Redis 达人',d:'Redis 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'os',n:'操作系统通',d:'操作系统模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ds-algo',n:'算法高手',d:'数据结构与算法模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'network',n:'网络专家',d:'计算机网络模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-rag',n:'RAG 先锋',d:'AI-RAG 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-spring',n:'AI Spring 达人',d:'AI Spring 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-finetune',n:'微调大师',d:'AI 微调模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-prompt',n:'Prompt 专家',d:'AI Prompt 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-eval',n:'评估达人',d:'AI 评估模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-security',n:'安全卫士',d:'AI 安全模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-design',n:'架构设计师',d:'AI 设计模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-openclaw',n:'OpenClaw 专家',d:'AI OpenClaw 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
{k:'ai-agent',n:'Agent 专家',d:'AI Agent 模块背诵 ≥ 20 题',t:'silver',e:true,ea:rd()},
],
'组合':[
{k:'combo_all_java',n:'Java 全栈',d:'集齐 Java 4 模块徽章',t:'legend',e:true,ea:rd()},
{k:'combo_all_ai',n:'AI 专家',d:'集齐全部 9 个 AI 模块',t:'legend',e:true,ea:rd()},
{k:'combo_all_cs',n:'计算机基础',d:'集齐 OS + 算法 + 网络',t:'legend',e:true,ea:rd()},
{k:'combo_all_modules',n:'全模块制霸',d:'集齐全部 19 个模块',t:'legend',e:true,ea:rd()},
]
};

const catMeta={
'背诵量':{icon:'📚',color:'#CD7F32',cls:'cat-volume',tc:'t-copper',ic:'i-copper'},
'质量':{icon:'💎',color:'#3B82F6',cls:'cat-quality',tc:'t-silver',ic:'i-silver'},
'坚持':{icon:'🔥',color:'#EF4444',cls:'cat-streak',tc:'t-silver',ic:'i-silver'},
'模块':{icon:'🏅',color:'#10B981',cls:'cat-module',tc:'t-silver',ic:'i-silver'},
'组合':{icon:'🧩',color:'#8B5CF6',cls:'cat-combo',tc:'t-legend',ic:'i-legend'},
};

// 稀有度 emoji
const tierEmoji={copper:'🥉',silver:'🥈',gold:'🥇',legend:'💎'};
const tierLabel={copper:'普通',silver:'稀有',gold:'史诗',legend:'传说'};
const tierColor={copper:'#CD7F32',silver:'#A0A0A0',gold:'#DAA520',legend:'#B44CF0'};

// ═══ 渲染 ═══
const app=document.getElementById('app');
for(const[cat,badges]of Object.entries(B)){
const m=catMeta[cat];const earned=badges.filter(b=>b.e).length;const total=badges.length;
let h=`<div><div class="flex items-center gap-3 mb-4">
<span class="text-xl">${m.icon}</span>
<h2 class="text-lg font-bold text-stone-800">${cat}</h2>
<span class="text-xs px-2 py-0.5 rounded-full text-white font-medium" style="background:${m.color}">${earned}/${total}</span>
</div>`;
h+=`<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">`;

badges.forEach(b=>{
const tc=tierColor[b.t];
if(b.e){
// ═══ 已获得 ═══
h+=`<div class="rounded-xl border-2 p-3 cursor-pointer transition-all duration-300 hover:-translate-y-1 hover:shadow-lg ${m.tc} earned ${m.cls}" onclick="show('${b.k}')">
<div class="flex items-start gap-3">
<div class="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center text-xl text-white shadow-md ${m.ic} relative">
${tierEmoji[b.t]}
<span class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-green-500 rounded-full flex items-center justify-center">
<svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span></div>
<div class="min-w-0 flex-1"><h3 class="font-semibold text-sm text-stone-800 truncate">${b.n}</h3>
<p class="text-xs text-stone-500 mt-0.5 line-clamp-1">${b.d}</p>
<p class="text-xs mt-2 font-medium" style="color:${tc}">🎉 ${b.ea}</p></div></div></div>`;
}else if(b.p>0){
// ═══ 进行中 ═══
const r=18,circ=2*Math.PI*r,offset=circ*(1-b.p/100);
h+=`<div class="rounded-xl border border-stone-200 bg-white/70 p-3 cursor-pointer transition-all duration-300 hover:-translate-y-1 hover:shadow-md ${m.cls}" onclick="show('${b.k}')">
<div class="flex items-start gap-3">
<div class="shrink-0 relative w-11 h-11 flex items-center justify-center">
<svg class="progress-ring w-11 h-11 absolute" viewBox="0 0 44 44"><circle cx="22" cy="22" r="${r}" fill="none" stroke="#e5e3e0" stroke-width="3"/><circle cx="22" cy="22" r="${r}" fill="none" stroke="${tc}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" class="progress-ring"/></svg>
<span class="text-[10px] font-bold text-stone-600 relative z-10">${b.p}%</span></div>
<div class="min-w-0 flex-1"><h3 class="font-semibold text-sm text-stone-600 truncate">${b.n}</h3>
<p class="text-xs text-stone-400 mt-0.5 line-clamp-1">${b.d}</p>
<p class="text-xs mt-2 text-stone-400">${b.cur}/${b.tgt}</p></div></div></div>`;
}else{
// ═══ 未解锁 ═══
h+=`<div class="rounded-xl border border-stone-200 bg-stone-50/60 p-3 opacity-55 ${m.cls}">
<div class="flex items-start gap-3">
<div class="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-stone-200 text-lg">🔒</div>
<div class="min-w-0 flex-1"><h3 class="font-semibold text-sm text-stone-400 truncate">${b.n}</h3>
<p class="text-xs text-stone-400 mt-0.5 line-clamp-1">${b.d}</p>
<p class="text-xs mt-2 text-stone-350 text-stone-400">暂未解锁</p></div></div></div>`;
}
});
h+=`</div></div>`;app.innerHTML+=h;
}

// ═══ 弹窗 ═══
function show(k){
let b=null;for(const cat of Object.values(B)){const f=cat.find(x=>x.k===k);if(f){b=f;break}}if(!b)return;
const tc=tierColor[b.t];const ic=b.e?{'copper':'i-copper','silver':'i-silver','gold':'i-gold','legend':'i-legend'}[b.t]:'';
const modal=document.getElementById('modal');const inner=document.getElementById('modal-inner');
inner.innerHTML=`
<button class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 text-stone-400 text-lg" onclick="closeModal()">✕</button>
<div class="text-center">
<div class="w-20 h-20 mx-auto mb-4 rounded-2xl flex items-center justify-center text-4xl text-white shadow-lg relative ${ic}" style="${b.e?'':'background:#e5e3e0;'}">
${b.e?tierEmoji[b.t]:'🔒'}
${b.e?`<span class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center"><svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span>`:''}</div>
<h2 class="text-xl font-bold text-stone-800 mb-1">${b.n}</h2>
<p class="text-sm text-stone-500 mb-3">${b.d}</p>
${b.e?`<p class="text-sm font-medium" style="color:${tc}">🎉 已获得 · ${b.ea}</p>`
:b.p>0?`<div class="mt-3"><div class="flex justify-between text-xs text-stone-400 mb-1"><span>进度</span><span>${b.cur}/${b.tgt}</span></div><div class="h-2 bg-stone-200 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all" style="width:${b.p}%;background:${tc}"></div></div><p class="text-xs text-stone-400 mt-2">还差 ${b.tgt-b.cur} 即可解锁</p></div>`
:`<p class="text-sm text-stone-400">暂未解锁</p>`}
<p class="text-xs mt-3 px-2 py-1 rounded-full inline-block font-medium" style="background:${tc}15;color:${tc}">${tierEmoji[b.t]} ${tierLabel[b.t]}</p></div>`;
modal.classList.remove('hidden');modal.classList.add('flex');
}
function closeModal(){const m=document.getElementById('modal');m.classList.add('hidden');m.classList.remove('flex');}
</script>
</body>
</html>
