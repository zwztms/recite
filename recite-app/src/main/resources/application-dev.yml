server:
  port: 18081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/recite
    username: recite
    password: recite123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.bugstack.recite.infrastructure.dao.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

redisson:
  address: redis://localhost:6379
  timeout: 3000
  connection-pool-size: 16

rocketmq:
  name-server: localhost:9876
  producer:
    group: recite-producer

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  chat-url: https://api.deepseek.com/v1/chat/completions

siliconflow:
  api-key: ${SILICONFLOW_API_KEY:}
  embedding-url: https://api.siliconflow.cn/v1/embeddings
  embedding-model: Qwen/Qwen3-Embedding-0.6B

sa-token:
  token-name: Authorization
  timeout: 604800
  is-concurrent: false
  is-share: false
  token-style: simple-uuid
  is-log: false
  jwt-secret-key: recite-app-jwt-secret-key-2026-v2

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /doc.html
